<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hudson Hustle premium README hero</title>
  <desc id="desc">Premium board-game style banner with an elegant title plaque, stylized NYC and New Jersey board, and refined transit card and ticket panels.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="44" x2="1136" y2="596" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E5266"/>
      <stop offset="0.38" stop-color="#3A6270"/>
      <stop offset="1" stop-color="#1E3744"/>
    </linearGradient>
    <linearGradient id="frame" x1="80" y1="70" x2="1120" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E4C58A"/>
      <stop offset="0.5" stop-color="#B68A45"/>
      <stop offset="1" stop-color="#E5C98F"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7ECD3"/>
      <stop offset="1" stop-color="#EAD8B0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9BC0C9"/>
      <stop offset="1" stop-color="#5C8DA2"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#456EA3"/>
      <stop offset="1" stop-color="#294563"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0E1A1F" flood-opacity="0.22"/>
    </filter>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .sans { font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif; }
      .gold { fill: #EAD19B; }
      .ink { fill: #241A12; }
      .soft { fill: #6B553C; }
      .cream { fill: #FDF8EE; }
      .region { fill: rgba(244, 232, 205, 0.18); font-size: 22px; letter-spacing: 5px; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="600" rx="34" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="600" rx="34" fill="none" stroke="url(#frame)" stroke-width="6"/>
  <rect x="34" y="34" width="1132" height="572" rx="26" fill="none" stroke="rgba(237,212,157,0.28)" stroke-width="1.5"/>

  <g opacity="0.96">
    <path d="M430 94C458 146 472 208 486 284C500 364 518 468 540 562H456C438 468 422 392 404 316C386 238 360 166 318 116L430 94Z" fill="url(#water)"/>
    <path d="M706 96C724 170 726 248 716 324C704 412 684 488 660 560H740C770 462 798 386 828 306C860 220 900 150 972 104L706 96Z" fill="url(#water)" opacity="0.88"/>
    <path d="M488 430C590 420 690 450 786 506C736 550 664 578 582 582C486 588 390 564 314 514C364 468 420 438 488 430Z" fill="url(#water)" opacity="0.84"/>
  </g>

  <g opacity="0.22" stroke="#E8D8B8" stroke-width="3.5" stroke-linecap="round">
    <path d="M316 110C372 156 394 232 408 314C420 392 432 474 442 558"/>
    <path d="M534 104C522 186 522 280 530 370C536 446 544 508 552 562"/>
    <path d="M656 112C652 206 638 298 620 384C606 448 594 510 588 560"/>
    <path d="M964 116C896 164 852 246 828 342C806 432 790 506 780 562"/>
  </g>

  <text x="234" y="118" class="serif region">NEW JERSEY</text>
  <text x="548" y="136" class="serif region">MANHATTAN</text>
  <text x="836" y="124" class="serif region">QUEENS</text>
  <text x="742" y="558" class="serif region">BROOKLYN</text>

  <g opacity="0.96">
    <circle cx="332" cy="210" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="372" cy="290" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="504" cy="230" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="548" cy="340" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="656" cy="222" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="802" cy="246" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="946" cy="222" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="756" cy="444" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="1002" cy="390" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <circle cx="820" cy="526" r="10" fill="#F7EED8" stroke="#2B1C12" stroke-width="3"/>
    <rect x="348" y="240" width="66" height="14" rx="7" transform="rotate(58 348 240)" fill="#355F9C"/>
    <rect x="470" y="282" width="80" height="14" rx="7" transform="rotate(66 470 282)" fill="#8E5A79"/>
    <rect x="568" y="232" width="88" height="14" rx="7" transform="rotate(-8 568 232)" fill="#C89A44"/>
    <rect x="682" y="232" width="112" height="14" rx="7" transform="rotate(10 682 232)" fill="#3E7D61"/>
    <rect x="730" y="388" width="78" height="14" rx="7" transform="rotate(54 730 388)" fill="#A2483D"/>
    <rect x="884" y="286" width="108" height="14" rx="7" transform="rotate(55 884 286)" fill="#77609A"/>
    <rect x="856" y="470" width="146" height="14" rx="7" transform="rotate(-22 856 470)" fill="#3A3A3A"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="134" width="376" height="370" rx="28" fill="url(#paper)" stroke="#D1B07A"/>
    <rect x="92" y="148" width="348" height="342" rx="18" fill="none" stroke="rgba(120,88,46,0.18)"/>
    <text x="266" y="186" text-anchor="middle" class="sans soft" font-size="16" font-weight="700" letter-spacing="4">NYC / NJ TRANSIT STRATEGY GAME</text>
    <text x="266" y="262" text-anchor="middle" class="serif ink" font-size="68" font-weight="700">Hudson</text>
    <text x="266" y="328" text-anchor="middle" class="serif ink" font-size="68" font-weight="700">Hustle</text>
    <path d="M156 354H376" stroke="#C9A86E" stroke-width="2"/>
    <text x="266" y="394" text-anchor="middle" class="sans soft" font-size="24">
      <tspan x="266" dy="0">Claim crossings, complete hidden</tspan>
      <tspan x="266" dy="34">tickets, and outmaneuver rivals</tspan>
      <tspan x="266" dy="34">across the core metro map.</tspan>
    </text>
    <rect x="160" y="446" width="212" height="36" rx="18" fill="#28465A"/>
    <text x="266" y="470" text-anchor="middle" class="sans cream" font-size="18" font-weight="700" letter-spacing="2">LOCAL V1 / ONLINE V2</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="826" y="120" width="280" height="170" rx="24" fill="url(#cardBlue)" stroke="rgba(255,255,255,0.16)"/>
    <rect x="842" y="136" width="248" height="138" rx="16" fill="none" stroke="rgba(255,255,255,0.14)"/>
    <text x="854" y="156" class="sans" fill="#E8EFF8" font-size="14" font-weight="700" letter-spacing="3">TRANSIT CARD</text>
    <text x="854" y="220" class="serif" fill="#FFF9EF" font-size="44" font-weight="700">Cobalt</text>
    <text x="854" y="252" class="sans" fill="#D4E4F2" font-size="19">Use matching sets to claim routes.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="818" y="318" width="288" height="182" rx="24" fill="url(#paper)" stroke="#D1B07A"/>
    <rect x="832" y="332" width="260" height="154" rx="16" fill="none" stroke="rgba(120,88,46,0.18)"/>
    <text x="848" y="358" class="sans soft" font-size="14" font-weight="700" letter-spacing="3">DESTINATION TICKET</text>
    <text x="848" y="412" class="serif ink" font-size="30" font-weight="700">
      <tspan x="848" dy="0">Hoboken</tspan>
      <tspan x="848" dy="34">to Flushing</tspan>
    </text>
    <text x="848" y="470" class="sans soft" font-size="18">Connect both cities before the end of the game.</text>
    <rect x="982" y="440" width="92" height="34" rx="17" fill="#E5D0A3"/>
    <text x="1028" y="462" text-anchor="middle" class="sans ink" font-size="18" font-weight="700">13 pts</text>
  </g>
</svg>
