name: Docs task
description: Create a docs-only issue that should land in the Hudson Hustle Roadmap project.
title: "[Docs] "
labels:
  - documentation
projects:
  - hudsonrivercrossing/1
body:
  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Version milestone such as V2.2.
      placeholder: V2.2
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What doc gap or doc update is needed?
      placeholder: Describe the specific doc outcome.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the doc outcomes that make this issue done.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: What should be checked after the doc update?
      placeholder: |
        - linked docs updated
        - terminology aligned
        - examples still match the product
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What is not part of this docs issue?
      placeholder: |
        - ...
    validations:
      required: true
