name: Sync Roadmap Issue Metadata

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  issues: write
  repository-projects: write

jobs:
  sync-roadmap-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Sync milestone, labels, and roadmap fields
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const existingLabels = (issue.labels || []).map((label) => typeof label === "string" ? label : label.name);

            function parseSections(markdown) {
              const sections = {};
              const headingRegex = /^###\s+(.+)$/gm;
              const matches = [...markdown.matchAll(headingRegex)];

              for (const [index, match] of matches.entries()) {
                const heading = match[1]?.trim();
                const start = (match.index ?? 0) + match[0].length;
                const end = index + 1 < matches.length ? (matches[index + 1].index ?? markdown.length) : markdown.length;
                if (!heading) {
                  continue;
                }
                sections[heading] = markdown.slice(start, end).trim();
              }
              return sections;
            }

            function firstLine(value) {
              return (value || "").split("\n")[0].trim();
            }

            const sections = parseSections(body);

            const areaMap = {
              Engineering: { label: "area:engineering", track: "Engineering" },
              Docs: { label: "area:docs", track: "Docs" },
              Design: { label: "area:design", track: "Design" },
              Gameplay: { label: "area:gameplay", track: "Gameplay" },
              Product: { label: "area:product", track: "Product" },
              Ops: { label: "area:ops", track: "Ops" },
            };
            const areaLabels = Object.values(areaMap).map((entry) => entry.label);

            let area = firstLine(sections["Area"]);
            if (!area && (existingLabels.includes("area:docs") || existingLabels.includes("documentation"))) {
              area = "Docs";
            }

            const milestoneTitle = firstLine(sections["Milestone"]);
            const horizon = firstLine(sections["Horizon"]);
            const priority = firstLine(sections["Priority"]);
            const metadataLooksFormDriven = Boolean(milestoneTitle || horizon || priority || area);

            if (!metadataLooksFormDriven) {
              core.info("Issue does not look like a repo issue-form issue. Skipping metadata sync.");
              return;
            }

            const nextAreaLabel = area && areaMap[area] ? areaMap[area].label : null;
            const labelsToRemove = areaLabels.filter((label) => label !== nextAreaLabel && existingLabels.includes(label));

            if (labelsToRemove.length > 0) {
              await github.rest.issues.removeLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToRemove,
              });
            }

            const labelsToAdd = [];
            if (nextAreaLabel && !existingLabels.includes(nextAreaLabel)) {
              labelsToAdd.push(nextAreaLabel);
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
            }

            if (milestoneTitle) {
              const milestones = await github.paginate(github.rest.issues.listMilestones, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "all",
                per_page: 100,
              });

              const matchedMilestone = milestones.find((milestone) => milestone.title === milestoneTitle);
              if (matchedMilestone && issue.milestone?.number !== matchedMilestone.number) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: matchedMilestone.number,
                });
              }
            }

            try {
              const roadmapOwner = "hudsonrivercrossing";
              const roadmapProjectTitle = "Hudson Hustle Roadmap";

              const projectData = await github.graphql(
                `
                  query($login: String!, $query: String!, $cursor: String) {
                    organization(login: $login) {
                      projectsV2(first: 20, query: $query) {
                        nodes {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2FieldCommon {
                                id
                                name
                              }
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                          items(first: 100, after: $cursor) {
                            pageInfo {
                              hasNextPage
                              endCursor
                            }
                            nodes {
                              id
                              content {
                                ... on Issue {
                                  number
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `,
                {
                  login: roadmapOwner,
                  query: roadmapProjectTitle,
                  cursor: null,
                },
              );

              const project = projectData.organization?.projectsV2?.nodes?.find(
                (node) => node?.title === roadmapProjectTitle,
              );

              if (!project) {
                core.warning(`Roadmap project '${roadmapProjectTitle}' is not visible to this workflow. Skipping project sync.`);
                return;
              }

              let projectItem = project.items.nodes.find((node) => node.content?.number === issue.number);
              let nextCursor = project.items.pageInfo.hasNextPage ? project.items.pageInfo.endCursor : null;

              while (!projectItem && nextCursor) {
                const nextPage = await github.graphql(
                  `
                    query($projectId: ID!, $cursor: String) {
                      node(id: $projectId) {
                        ... on ProjectV2 {
                          items(first: 100, after: $cursor) {
                            pageInfo {
                              hasNextPage
                              endCursor
                            }
                            nodes {
                              id
                              content {
                                ... on Issue {
                                  number
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `,
                  {
                    projectId: project.id,
                    cursor: nextCursor,
                  },
                );

                const page = nextPage.node.items;
                projectItem = page.nodes.find((node) => node.content?.number === issue.number);
                nextCursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
              }

              if (!projectItem) {
                const addResult = await github.graphql(
                  `
                    mutation($projectId: ID!, $contentId: ID!) {
                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                        item {
                          id
                        }
                      }
                    }
                  `,
                  {
                    projectId: project.id,
                    contentId: issue.node_id,
                  },
                );

                projectItem = { id: addResult.addProjectV2ItemById.item.id };
              }

              const fieldsByName = new Map(project.fields.nodes.map((field) => [field.name, field]));

              async function updateSingleSelect(fieldName, optionName) {
                if (!optionName) return;
                const field = fieldsByName.get(fieldName);
                const option = field?.options?.find((entry) => entry.name === optionName);
                if (!field || !option) {
                  core.info(`No matching field option for ${fieldName}: ${optionName}`);
                  return;
                }

                await github.graphql(
                  `
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(
                        input: {
                          projectId: $projectId
                          itemId: $itemId
                          fieldId: $fieldId
                          value: { singleSelectOptionId: $optionId }
                        }
                      ) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `,
                  {
                    projectId: project.id,
                    itemId: projectItem.id,
                    fieldId: field.id,
                    optionId: option.id,
                  },
                );
              }

              await updateSingleSelect("Track", area && areaMap[area] ? areaMap[area].track : undefined);
              await updateSingleSelect("Horizon", horizon);
              await updateSingleSelect("Priority", priority);
            } catch (error) {
              core.warning(`Roadmap project sync skipped: ${error instanceof Error ? error.message : String(error)}`);
            }
